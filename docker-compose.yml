version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rentalguard
      POSTGRES_PASSWORD: rentalguard_dev
      POSTGRES_DB: rentalguard
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rentalguard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
